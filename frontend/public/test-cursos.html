<!DOCTYPE html>
<html>
<head>
    <title>Test Cursos API</title>
</head>
<body>
    <h1>Prueba de Cursos API</h1>
    <button onclick="cargarCursos()">Cargar Cursos</button>
    <pre id="resultado"></pre>

    <script>
        function cargarCursos() {
            const token = localStorage.getItem('token');
            document.getElementById('resultado').innerText = 'Cargando...';
            
            fetch('http://localhost:5000/api/cursos', {
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('resultado').innerText = JSON.stringify(data, null, 2);
            })
            .catch(err => {
                document.getElementById('resultado').innerText = 'Error: ' + err.message;
            });
        }
    </script>
</body>
</html>
